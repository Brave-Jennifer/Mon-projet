{% extends "base.html" %}
{% block titre %}Suivi consultation{% endblock %}
{% block contenu %}
<h1>Suivi médical — {{ consultation.patient.nom_complet }}</h1>
<p>{{ consultation.date_heure.strftime('%d/%m/%Y %H:%M') }} — Dr {{ consultation.medecin.nom_complet }} — {{ consultation.motif }}</p>

<form class="formulaire" method="post">
  <input type="hidden" name="medecin_id" value="{{ consultation.medecin_id }}">
  <div class="ligne">
    <div><label>Poids (kg)</label><input type="number" step="0.1" name="poids_kg" value="{{ consultation.poids_kg or '' }}"></div>
    <div><label>Taille (cm)</label><input type="number" step="0.1" name="taille_cm" value="{{ consultation.taille_cm or '' }}"></div>
  </div>
  <label>Symptômes observés</label>
  <textarea name="symptomes" rows="2">{{ consultation.symptomes or '' }}</textarea>
  <label>Diagnostic</label>
  <textarea name="diagnostic" rows="2">{{ consultation.diagnostic or '' }}</textarea>
  <label>Traitement prescrit</label>
  <textarea name="traitement_prescrit" rows="2">{{ consultation.traitement_prescrit or '' }}</textarea>
  <label>Examens complémentaires demandés</label>
  <textarea name="examens_complementaires" rows="2">{{ consultation.examens_complementaires or '' }}</textarea>
  <label>Notes du médecin</label>
  <textarea name="notes_medecin" rows="3">{{ consultation.notes_medecin or '' }}</textarea>

  <p style="margin-top:1.2rem;"><button class="btn" type="submit">Enregistrer le suivi</button></p>
</form>
{% endblock %}
